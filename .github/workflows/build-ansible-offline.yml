name: Download Ansible for CentOS 7 Offline

on:
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: centos:7
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies in CentOS 7
        run: |
          # 安装 EPEL 源 (包含 python36-pip)
          yum install -y epel-release
          # 安装 Python 3.6 和 pip
          yum install -y python36 python36-pip yum-utils
          # 升级 pip 以确保能识别正确的 manylinux 标签
          pip3 install --upgrade pip setuptools wheel

      - name: Download Ansible and Dependencies
        run: |
          # 创建下载目录
          mkdir -p /workspace/ansible_offline
          cd /workspace/ansible_offline
          
          # 下载 Ansible 2.10.7 (最后一个支持 Python 3.6 且包含所有集合的版本，适合 CentOS 7)
          # 如果需更新版本，可改为 ansible-core==2.11.12，但 2.10.7 离线安装更简单
          pip3 download ansible==2.10.7 -d ./wheels
          
          # 打包
          tar -czvf ansible_centos7_offline.tar.gz ./wheels

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ansible-centos7-offline-package
          path: /workspace/ansible_offline/ansible_centos7_offline.tar.gz
          retention-days: 90

name: Build llama.cpp for CentOS 7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 注意：这里不在 job 级别定义 container，我们在 step 级别用
    
    steps:
      - name: Checkout Code (Running on Ubuntu)
        uses: actions/checkout@v4
        with:
          repository: ggerganov/llama.cpp
          fetch-depth: 1

      - name: Build inside CentOS 7 Container
        # 使用 docker run 这种方式，编译完即退出，不依赖容器内的 Node.js
        run: |
          docker run --rm -v ${{ github.workspace }}:/ws -w /ws quay.io/pypa/manylinux2014_x86_64 bash -c "
            # 1. 安装环境
            yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++ devtoolset-11-binutils python3
            python3 -m pip install cmake
            ln -s /usr/local/bin/cmake /usr/bin/cmake
            
            # 2. 编译
            source /opt/rh/devtoolset-11/enable
            mkdir -p build && cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DGGML_AVX512=ON \
              -DBUILD_SHARED_LIBS=OFF \
              -DGGML_STATIC=ON \
              -DCMAKE_EXE_LINKER_FLAGS='-static-libgcc -static-libstdc++' \
              -DCMAKE_SKIP_RPATH=ON
            make -j$(nproc) llama-cli llama-server llama-quantize
            
            # 3. 整理产物
            mkdir -p /ws/release_bin
            cp bin/llama-cli bin/llama-server bin/llama-quantize /ws/release_bin/
          "

      - name: Package (Running on Ubuntu)
        run: |
          tar -czvf llama-cpp-centos7-avx512.tar.gz release_bin/

      - name: Upload Artifact (Running on Ubuntu)
        # 此时在宿主机 Ubuntu 上运行，glibc 没问题
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-centos7-binary
          path: llama-cpp-centos7-avx512.tar.gz

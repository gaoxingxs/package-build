name: Build llama.cpp for CentOS 7

on:
  workflow_dispatch:

jobs:
  build-centos7:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux2014_x86_64
    
    steps:
      - name: Install System Dependencies
        run: |
          # 1. 安装基础工具
          yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++ devtoolset-11-binutils git wget python3
          
          # 2. 升级 pip 并安装 cmake
          python3 -m pip install --upgrade pip
          python3 -m pip install cmake

      - name: Manual Clone (Fix Node.js Glibc Error)
        run: |
          # 由于 actions/checkout 需要高版本 glibc，我们手动 clone
          git clone --depth 1 https://github.com/ggerganov/llama.cpp .
          # 如果需要子模块，取消下面行的注释
          # git submodule update --init --recursive

      - name: Build
        run: |
          # 激活 GCC 11
          source /opt/rh/devtoolset-11/enable
          
          mkdir build
          cd build
          
          # 针对你的 Xeon 4214 (Cascade Lake) 开启 AVX512
          # 静态链接 libstdc++ 以兼容 CentOS 7 宿主机
          python3 -m cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_AVX512=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_SKIP_RPATH=ON
          
          python3 -m cmake --build . --config Release -j $(nproc)

      - name: Package Binaries
        run: |
          mkdir -p release_bin
          cp build/bin/llama-cli release_bin/
          cp build/bin/llama-server release_bin/
          tar -czvf llama-cpp-centos7-avx512.tar.gz release_bin/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-centos7-binary
          path: llama-cpp-centos7-avx512.tar.gz

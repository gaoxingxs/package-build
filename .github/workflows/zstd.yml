name: Build zstd Static

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: facebook/zstd

      - name: Install dependencies
        run: |
          sudo apt-get update
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            # 安装交叉编译完整工具链
            sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross
          else
            sudo apt-get install -y build-essential
          fi

      - name: Compile zstd (Static Binary Only)
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            # 明确指定 CC, AR 和 LDFLAGS，只编译 zstd 程序本身
            make -j$(nproc) zstd-release \
              CC=aarch64-linux-gnu-gcc \
              AR=aarch64-linux-gnu-ar \
              LDFLAGS="-static"
          else
            # amd64 同样只编译 zstd-release
            make -j$(nproc) zstd-release LDFLAGS="-static"
          fi

      - name: Verify and Rename
        run: |
          # 检查文件类型确保是静态链接
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            file zstd
            ldd zstd || echo "Static check passed"
          fi
          mv zstd zstd-${{ matrix.arch }}-static

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zstd-${{ matrix.arch }}-static
          path: zstd-${{ matrix.arch }}-static
